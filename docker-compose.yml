version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: cinema-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-11082003}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-db_cinema}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cinema-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-db_cinema}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_ROOT_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-11082003}
      JWT_SECRET: ${JWT_SECRET_KEY:-d1AhbW9bBYZwXoENsaGu4bgY3+rLo/YRsBnRhrsQPak=}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-2592000000}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:8080/api/payment/paymentCallback}
      VNPAY_URL: ${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-4BUXV61C}
      VNPAY_SECRET_KEY: ${VNPAY_SECRET_KEY:-VMWVW9J5EVL20YJJISORDIB988PKOU9K}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dahzoj4fy}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-884148763248879}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-a6dL6HNdCJBOryZU46zTfaRyH-E}
    env_file:
      - .env

volumes:
  mysql_data:
